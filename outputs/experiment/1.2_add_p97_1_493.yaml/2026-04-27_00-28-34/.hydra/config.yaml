general:
  name: ${hydra:job.config_name}
  device: cuda
  seed: 493
data:
  train_data_path: data/1.1_grok_data_0.5_42/add_p97_train.txt
  val_data_path: data/1.1_grok_data_0.5_42/add_p97_test.txt
training:
  batch_size: 512
  max_steps: 20000
  last_token_only: true
  eval_interval: 10
  save_interval: 5000
  lr: 0.001
  weight_decay: 0
  betas:
  - 0.9
  - 0.98
gptconfig:
  block_size: 8
  vocab_size: 16384
  n_layer: 1
  n_head: 4
  n_embd: 128
  dropout: 0.0
  bias: false
wandb:
  project: cse493s-hw1
  run_name: ${general.name}
