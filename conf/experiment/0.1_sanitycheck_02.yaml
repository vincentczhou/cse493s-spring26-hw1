general:
  name: ${hydra:job.config_name}
  device: cuda # or cpu
  seed: 493

hydra:
  run:
    dir: outputs/${general.name}/${now:%Y-%m-%d_%H-%M-%S}

data:
  train_data_path: data/sanitycheck.txt
  val_data_path: data/sanitycheck.txt

training:
  batch_size: 1
  max_steps: 150
  last_token_only: true
  eval_interval: 1
  save_interval: 500
  lr: 3e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

gptconfig:
  block_size: 16
  vocab_size: 50  # overridden at runtime by tokenizer size
  n_layer: 1
  n_head: 4
  n_embd: 128
  dropout: 0.0
  bias: false

wandb:
  project: cse493s-hw1
  run_name: ${general.name}
